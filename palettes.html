<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swimmers — Palette explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",system-ui,sans-serif;background:#1a1d22;color:#e7ecf1;padding:40px 24px 80px;-webkit-font-smoothing:antialiased}
.serif{font-family:"Instrument Serif",Georgia,serif;font-weight:400;line-height:1.02}
.it{font-family:"Instrument Serif",Georgia,serif;font-style:italic}
.page-head{max-width:1200px;margin:0 auto 36px;text-align:center}
.page-head h1{font-family:"Instrument Serif",serif;font-size:2.6rem;margin-bottom:8px}
.page-head p{color:#9aa6b2;font-size:1rem}
.grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}

/* each palette tile renders its own mini hero using local vars */
.tile{border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 50px -24px rgba(0,0,0,.6)}
.swatches{display:flex;gap:0}
.swatches i{height:8px;flex:1}
.demo{padding:34px 32px 32px;background:var(--bg);color:var(--ink);position:relative;overflow:hidden;min-height:330px}
.ripples{position:absolute;top:-90px;right:-90px;width:280px;height:280px;opacity:.5;pointer-events:none}
.tag{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;position:relative;z-index:1}
.tag .rule{width:34px;height:8px;background-image:repeating-linear-gradient(90deg,var(--accent) 0 1px,transparent 1px 7px);opacity:.7}
.tag b{color:var(--accent-deep);font-weight:600}
.demo h2{font-family:"Instrument Serif",serif;font-size:2.5rem;line-height:.98;position:relative;z-index:1}
.demo h2 .it{color:var(--accent-deep)}
.demo .sub{color:var(--muted);font-size:.95rem;margin:12px 0 22px;max-width:42ch;position:relative;z-index:1}
.btns{display:flex;gap:10px;margin-bottom:24px;position:relative;z-index:1}
.bp{display:inline-flex;align-items:center;font-weight:600;font-size:14px;color:var(--btn-text);background:var(--accent-deep);padding:11px 20px;border-radius:10px;border:1px solid var(--btn-border);box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
.bs{display:inline-flex;align-items:center;font-weight:600;font-size:14px;color:var(--ink);background:transparent;padding:11px 18px;border-radius:10px;border:1px solid var(--card-border)}
.card{background:var(--surface);border:1px solid var(--card-border);border-radius:14px;padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:1}
.card small{display:block;font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.card .n{font-family:"Instrument Serif",serif;font-size:2.6rem;line-height:1}
.card .up{color:var(--up);font-size:12px;font-weight:600}
.card .chips{display:flex;gap:8px}
.card .chip{text-align:center}
.card .chip b{font-family:"Instrument Serif",serif;font-size:1.3rem;display:block}
.name{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#21252b;font-size:13px}
.name .nm{font-weight:600}
.name .hex{color:#8b96a2;font-family:ui-monospace,monospace;font-size:11px}
</style>
</head>
<body>
<div class="page-head">
  <h1>Swimmers — palette options</h1>
  <p>Same layout, six color schemes. Tell me a number (or mix-and-match) and I'll build the full page in it.</p>
</div>

<div class="grid" id="grid"></div>

<script>
const palettes=[
  {n:"1 · Cobalt on White", hex:"#FFFFFF · #2563EB",
   bg:"#ffffff", surface:"#f4f7fb", ink:"#0f1b2d", muted:"#5b6b80",
   accent:"#3b82f6", accentDeep:"#2563eb", up:"#1d9e6f", btnText:"#fff", btnBorder:"rgba(20,40,90,.3)", cardBorder:"#e4e9f0"},

  {n:"2 · Icy Monochrome", hex:"#EAF1F8 · #245A92",
   bg:"#e9f0f7", surface:"#ffffff", ink:"#13243a", muted:"#5a708a",
   accent:"#4a8fc7", accentDeep:"#245a92", up:"#1d9e6f", btnText:"#fff", btnBorder:"rgba(15,40,70,.3)", cardBorder:"#d8e4f0"},

  {n:"3 · Slate Neutral", hex:"#ECEFF3 · #3E7CB8",
   bg:"#eceff3", surface:"#ffffff", ink:"#1a232e", muted:"#5d6b7a",
   accent:"#5a93c9", accentDeep:"#3e7cb8", up:"#1d9e6f", btnText:"#fff", btnBorder:"rgba(20,35,55,.3)", cardBorder:"#dde3ea"},

  {n:"4 · Midnight (dark)", hex:"#0B1620 · #38BDF8",
   bg:"#0b1620", surface:"#13232f", ink:"#eaf2f8", muted:"#8aa0b0",
   accent:"#38bdf8", accentDeep:"#38bdf8", up:"#34d399", btnText:"#04141f", btnBorder:"rgba(56,189,248,.5)", cardBorder:"rgba(138,160,176,.18)"},

  {n:"5 · Petrol Teal (dark)", hex:"#07302F · #34D0C4",
   bg:"#072e2d", surface:"#0c3d3b", ink:"#e6f3f1", muted:"#7fa9a5",
   accent:"#34d0c4", accentDeep:"#34d0c4", up:"#6fe0a0", btnText:"#042322", btnBorder:"rgba(52,208,196,.5)", cardBorder:"rgba(127,169,165,.2)"},

  {n:"6 · Indigo Night (dark)", hex:"#11132B · #7C8CFF",
   bg:"#10122a", surface:"#1b1e3d", ink:"#e8eafb", muted:"#9aa0cf",
   accent:"#7c8cff", accentDeep:"#7c8cff", up:"#5fd0a0", btnText:"#0c0f24", btnBorder:"rgba(124,140,255,.5)", cardBorder:"rgba(154,160,207,.2)"}
];

const ripple=c=>`<svg class="ripples" viewBox="0 0 200 200" fill="none"><circle cx="120" cy="80" r="28" stroke="${c}" stroke-width="1"/><circle cx="120" cy="80" r="48" stroke="${c}" stroke-width="1"/><circle cx="120" cy="80" r="68" stroke="${c}" stroke-width="1"/><circle cx="120" cy="80" r="88" stroke="${c}" stroke-width="1"/><circle cx="120" cy="80" r="6" fill="${c}"/></svg>`;

document.getElementById('grid').innerHTML=palettes.map(p=>`
  <div class="tile">
    <div class="swatches"><i style="background:${p.bg}"></i><i style="background:${p.surface}"></i><i style="background:${p.accent}"></i><i style="background:${p.accentDeep}"></i><i style="background:${p.ink}"></i></div>
    <div class="demo" style="--bg:${p.bg};--surface:${p.surface};--ink:${p.ink};--muted:${p.muted};--accent:${p.accent};--accent-deep:${p.accentDeep};--up:${p.up};--btn-text:${p.btnText};--btn-border:${p.btnBorder};--card-border:${p.cardBorder}">
      ${ripple(p.accent)}
      <div class="tag"><span class="rule"></span> <b>Fig. 02</b> — The numbers</div>
      <h2>Rank your <span class="it">swimmers.</span></h2>
      <p class="sub">Lab-grade testing from home, one score you understand.</p>
      <div class="btns"><span class="bp">Get early access</span><span class="bs">How it works</span></div>
      <div class="card">
        <div><small>Swim Score</small><div class="n">82</div><span class="up">▲ 14 in 90 days</span></div>
        <div class="chips"><div class="chip"><small>Mot.</small><b>61%</b></div><div class="chip"><small>Conc.</small><b>54</b></div></div>
      </div>
    </div>
    <div class="name"><span class="nm">${p.n}</span><span class="hex">${p.hex}</span></div>
  </div>`).join('');
</script>
</body>
</html>
